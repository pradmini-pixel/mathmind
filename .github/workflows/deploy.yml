name: Deploy MathMind to GitHub Pages

# Build the Vite app and publish it to the `gh-pages` branch on every push to
# the main development branches. GitHub Pages then serves it at
# https://<user>.github.io/mathmind/.
on:
  push:
    branches:
      - main
      - claude/mathmind-warmup-app-g44jpz
  workflow_dispatch:

permissions:
  contents: write # needed to push the built site to the gh-pages branch

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
